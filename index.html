<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Top Fan Comments</title>
    <meta name="description" content="A livestream overlay for rotating curated Top Fan Comments.">
    <link rel="stylesheet" href="styles.css?v=20260714-024">
  </head>
  <body>
    <main class="overlay" aria-live="polite">
      <section class="comment-card" id="commentCard">
        <header class="brand-header">
          <div class="brand-mark" aria-hidden="true">TF</div>
          <div class="brand-copy">
            <div class="title-row">
              <h1>Top Fan Comments</h1>
              <span class="title-separator" aria-hidden="true">/</span>
              <div class="comment-user" id="commentUser"></div>
            </div>
          </div>
        </header>
        <div class="comment-body" id="commentBody">
          <p class="comment-text" id="commentText"></p>
          <div class="comment-meta" id="commentMeta"></div>
        </div>
      </section>
    </main>
    <iframe
      class="tts-frame"
      src="https://kickbot.com/external/47466255765229420000/tts"
      title="Kickbot TTS"
      allow="autoplay"
    ></iframe>
    <script src="app.js?v=20260714-024"></script>
  </body>
</html>
