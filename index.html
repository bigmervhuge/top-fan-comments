<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BMH Media Player</title>
    <meta name="description" content="A livestream overlay media player.">
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body:not(.app-ready) .overlay,
      .media-card,
      .media-video {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <main class="overlay" aria-live="polite">
      <section class="comment-card" id="commentCard">
        <header class="brand-header">
          <div class="brand-copy">
            <div class="title-row">
              <h1></h1>
              <span class="title-separator" aria-hidden="true">/</span>
              <div class="comment-user" id="commentUser"></div>
            </div>
          </div>
        </header>
        <div class="comment-body" id="commentBody">
          <p class="comment-text" id="commentText"></p>
          <div class="comment-meta" id="commentMeta"></div>
        </div>
      </section>
      <section class="media-card" id="mediaCard" aria-hidden="true">
        <video class="media-video" id="commandVideo" playsinline preload="auto"></video>
      </section>
      <section class="command-card" id="commandCard" hidden>
        <div class="command-title" id="commandTitle">The Wisdom Of Caldwell</div>
        <div class="command-text" id="commandText"></div>
        <div class="command-meta" id="commandMeta"></div>
      </section>
      <audio id="commandAudio" preload="auto"></audio>
    </main>
    <script>
      (function () {
        var loadedVersion = "20260724-001";
        var pollMs = 60000;

        function versionUrl() {
          return "version.json?t=" + Date.now();
        }

        function getVersion(done) {
          var request = new XMLHttpRequest();
          request.open("GET", versionUrl(), true);
          request.setRequestHeader("Cache-Control", "no-cache");
          request.onreadystatechange = function () {
            if (request.readyState !== 4) {
              return;
            }

            if (request.status >= 200 && request.status < 300) {
              try {
                var payload = JSON.parse(request.responseText);
                done(payload.version || loadedVersion);
              } catch (error) {
                done(loadedVersion);
              }
              return;
            }

            done(loadedVersion);
          };
          request.send();
        }

        function assetUrl(path, version) {
          return path + "?v=" + encodeURIComponent(version);
        }

        function loadScript(version) {
          var script = document.createElement("script");
          script.src = assetUrl("app.js", version);
          document.body.appendChild(script);
        }

        function loadAssets(version) {
          loadedVersion = version;

          var css = document.createElement("link");
          css.rel = "stylesheet";
          css.href = assetUrl("styles.css", version);
          css.onload = function () {
            loadScript(version);
          };
          css.onerror = function () {
            loadScript(version);
          };
          document.head.appendChild(css);
        }

        function watchVersion() {
          window.setInterval(function () {
            getVersion(function (version) {
              if (version && version !== loadedVersion) {
                window.location.reload();
              }
            });
          }, pollMs);
        }

        getVersion(function (version) {
          loadAssets(version);
          watchVersion();
        });
      }());
    </script>
  </body>
</html>
