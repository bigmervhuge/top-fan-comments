<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Top Fan Comments</title>
    <meta name="description" content="A livestream overlay for rotating curated Top Fan Comments.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="overlay" aria-live="polite">
      <section class="comment-card" id="commentCard">
        <header class="brand-header">
          <div class="brand-mark" aria-hidden="true">TF</div>
          <div class="brand-copy">
            <div class="title-row">
              <h1>Top Fan Comments</h1>
              <div class="comment-user" id="commentUser"></div>
            </div>
          </div>
        </header>
        <div class="comment-body" id="commentBody">
          <p class="comment-text" id="commentText"></p>
          <div class="comment-meta" id="commentMeta"></div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
